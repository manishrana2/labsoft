services:
  - type: web
    name: labsoft
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: labsoft-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
