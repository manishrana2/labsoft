services:
  - type: web
    name: manishrana2-labsoft
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: NODE_ENV=production npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: JWT_SECRET
        generateValue: true
